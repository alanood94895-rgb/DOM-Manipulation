<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

   <link rel="stylesheet" href="style3.css">
</head>
<body>

<h1>Shopping Cart</h1>
<label>Product Name</label>
<input type="text" id="nameInput" placeholder="">
<label>Price</label>
<input type="number" id="priceInput" placeholder="Price">
<label>Quantity</label>
<input type="number" id="quantityInput" placeholder="Quantity">

<button id="addBtn">Add Item</button>

<button id="clearBtn">Clear Cart</button>

<div id="cartContainer"></div>

<p id="totalDisplay">Total: $0.00</p>
<script src="script.js"></script>
</body>
</html>
