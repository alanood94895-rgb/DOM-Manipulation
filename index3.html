<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        #addBtn {
            background: green;
            color: white;
        }

        #clearBtn {
            background: crimson;
            color: white;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eeeeee;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        .buttons button {
            margin-left: 5px;
        }

        .plus-btn {
            background: green;
            color: white;
        }

        .minus-btn {
            background: orange;
            color: white;
        }

        .remove-btn {
            background: red;
            color: white;
        }

        #totalDisplay {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Shopping Cart</h1>

    <input type="text" id="nameInput" placeholder="Product Name">

    <input type="number" id="priceInput" placeholder="Price">

    <input type="number" id="quantityInput" placeholder="Quantity">

    <button id="addBtn">Add Item</button>

    <button id="clearBtn">Clear Cart</button>

    <div id="cartContainer"></div>

    <p id="totalDisplay">Total: $0.00</p>

</div>

<script>

    // Select HTML elements
    const nameInput = document.getElementById("nameInput");
    const priceInput = document.getElementById("priceInput");
    const quantityInput = document.getElementById("quantityInput");

    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");

    const cartContainer = document.getElementById("cartContainer");
    const totalDisplay = document.getElementById("totalDisplay");

    // Add item button
    addBtn.addEventListener("click", addItem);

    // Add new item
    function addItem() {

        const name = nameInput.value.trim();
        const price = parseFloat(priceInput.value);
        const quantity = parseInt(quantityInput.value);

        // Validate input
        if (name === "" || isNaN(price) || price <= 0 || isNaN(quantity) || quantity <= 0) {
            alert("Please enter valid product information.");
            return;
        }

        // Create cart row
        const item = document.createElement("div");
        item.className = "cart-item";

        item.innerHTML = `
            <span class="product-name">${name}</span>

            <span class="price">${price.toFixed(2)}</span>

            <span>
                Qty:
                <span class="quantity">${quantity}</span>
            </span>

            <div class="buttons">
                <button class="plus-btn">+</button>
                <button class="minus-btn">-</button>
                <button class="remove-btn">Remove</button>
            </div>
        `;

        // Add item to cart
        cartContainer.appendChild(item);

        // Clear inputs
        nameInput.value = "";
        priceInput.value = "";
        quantityInput.value = "";

        calculateTotal();
    }

    // Event Delegation
    cartContainer.addEventListener("click", function(event){

        const item = event.target.closest(".cart-item");

        if(event.target.classList.contains("plus-btn")){
            updateQuantity(item,1);
        }

        if(event.target.classList.contains("minus-btn")){
            updateQuantity(item,-1);
        }

        if(event.target.classList.contains("remove-btn")){
            removeItem(item);
        }

    });

    // Update quantity
    function updateQuantity(itemElement, change){

        const quantityElement =
            itemElement.querySelector(".quantity");

        let quantity =
            parseInt(quantityElement.textContent);

        quantity += change;

        if(quantity <= 0){
            removeItem(itemElement);
            return;
        }

        quantityElement.textContent = quantity;

        calculateTotal();
    }

    // Remove item
    function removeItem(itemElement){

        itemElement.remove();

        calculateTotal();
    }

    // Calculate total price
    function calculateTotal(){

        let total = 0;

        const items =
            document.querySelectorAll(".cart-item");

        items.forEach(function(item){

            const price =
                parseFloat(item.querySelector(".price").textContent);

            const quantity =
                parseInt(item.querySelector(".quantity").textContent);

            total += price * quantity;

        });

        totalDisplay.textContent =
            "Total: $" + total.toFixed(2);

    }

    // Clear entire cart
    clearBtn.addEventListener("click", function(){

        cartContainer.innerHTML = "";

        calculateTotal();

    });

</script>

</body>
</html>
