<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabbed Content Manager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
        }

        #tabBar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #4CAF50;
            color: white;
        }

        .rename-btn,
        .delete-btn {
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .rename-btn {
            background: orange;
            color: white;
        }

        .delete-btn {
            background: crimson;
            color: white;
        }

        #contentArea {
            min-height: 200px;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            background: #fafafa;
            margin-bottom: 15px;
        }

        #addTabBtn {
            background: green;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        #saveContentBtn {
            background: royalblue;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }

        #tabCount {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Tabbed Content Manager</h1>

    <div id="tabBar"></div>

    <div id="contentArea" contenteditable="true"></div>

    <button id="addTabBtn">Add Tab</button>
    <button id="saveContentBtn">Save Content</button>

    <p id="tabCount">Total Tabs: 0</p>

</div>

<script>

    // Array to store tabs
    let tabs = [];

    // Store active tab id
    let activeTabId = null;

    // Select elements
    const tabBar = document.getElementById("tabBar");
    const contentArea = document.getElementById("contentArea");
    const addTabBtn = document.getElementById("addTabBtn");
    const saveContentBtn = document.getElementById("saveContentBtn");
    const tabCount = document.getElementById("tabCount");

    // Add Tab button event
    addTabBtn.addEventListener("click", addTab);

    // Save content button event
    saveContentBtn.addEventListener("click", saveCurrentContent);

    // Add new tab
    function addTab() {

        const tabNumber = tabs.length + 1;

        const newTab = {
            id: Date.now(),
            name: "Tab " + tabNumber,
            content: "<p>Content for Tab " + tabNumber + "</p>"
        };

        tabs.push(newTab);

        saveTabs();

        renderTabs();

        switchTab(newTab.id);
    }

    // Render tabs
    function renderTabs() {

        tabBar.innerHTML = "";

        tabs.forEach(function(tab) {

            const tabButton = document.createElement("div");

            tabButton.className = "tab-btn";

            if (tab.id === activeTabId) {
                tabButton.classList.add("active");
            }

            tabButton.dataset.tabId = tab.id;

            tabButton.innerHTML = `
                <span class="tab-name">${tab.name}</span>
                <button class="rename-btn">✏</button>
                <button class="delete-btn">✖</button>
            `;

            tabBar.appendChild(tabButton);

        });

        tabCount.textContent = "Total Tabs: " + tabs.length;

        if (tabs.length === 0) {
            contentArea.innerHTML =
                "No tabs available. Click 'Add Tab' to create one.";
        }
    }

    // Event Delegation
    tabBar.addEventListener("click", function(event) {

        const tabElement = event.target.closest(".tab-btn");

        if (!tabElement) return;

        const tabId = Number(tabElement.dataset.tabId);

        // Delete tab
        if (event.target.classList.contains("delete-btn")) {
            deleteTab(tabId);
            return;
        }

        // Rename tab
        if (event.target.classList.contains("rename-btn")) {

            const newName = prompt("Enter new tab name:");

            if (newName && newName.trim() !== "") {
                renameTab(tabId, newName.trim());
            }

            return;
        }

        // Switch tab
        switchTab(tabId);

    });

    // Switch active tab
    function switchTab(tabId) {

        activeTabId = tabId;

        const selectedTab = tabs.find(function(tab) {
            return tab.id === tabId;
        });

        if (!selectedTab) return;

        document.querySelectorAll(".tab-btn").forEach(function(btn) {
            btn.classList.remove("active");
        });

        const activeButton =
            document.querySelector(`[data-tab-id="${tabId}"]`);

        if (activeButton) {
            activeButton.classList.add("active");
        }

        contentArea.innerHTML = selectedTab.content;

        saveTabs();
    }

    // Rename tab
    function renameTab(tabId, newName) {

        const tab = tabs.find(function(tab) {
            return tab.id === tabId;
        });

        if (tab) {
            tab.name = newName;

            saveTabs();

            renderTabs();

            switchTab(activeTabId);
        }
    }

    // Delete tab
    function deleteTab(tabId) {

        tabs = tabs.filter(function(tab) {
            return tab.id !== tabId;
        });

        saveTabs();

        renderTabs();

        if (tabs.length > 0) {

            activeTabId = tabs[0].id;

            switchTab(activeTabId);

        } else {

            activeTabId = null;

            contentArea.innerHTML =
                "No tabs available. Click 'Add Tab' to create one.";
        }
    }

    // Save content of active tab
    function saveCurrentContent() {

        const activeTab = tabs.find(function(tab) {
            return tab.id === activeTabId;
        });

        if (!activeTab) return;

        activeTab.content = contentArea.innerHTML;

        saveTabs();

        alert("Content Saved Successfully");
    }

    // Save tabs to localStorage
    function saveTabs() {

        localStorage.setItem(
            "tabsData",
            JSON.stringify(tabs)
        );

        localStorage.setItem(
            "activeTabId",
            activeTabId
        );
    }

    // Load tabs from localStorage
    function loadTabs() {

        const storedTabs =
            localStorage.getItem("tabsData");

        const storedActiveTab =
            localStorage.getItem("activeTabId");

        if (storedTabs) {

            tabs = JSON.parse(storedTabs);

        } else {

            tabs = [
                {
                    id: Date.now(),
                    name: "Home",
                    content: `
                        <h2>Welcome</h2>
                        <p>Welcome to the dashboard!</p>
                        <ul>
                            <li>Manage Tabs</li>
                            <li>Edit Content</li>
                            <li>Save Automatically</li>
                        </ul>
                    `
                }
            ];

            saveTabs();
        }

        renderTabs();

        if (tabs.length > 0) {

            if (storedActiveTab) {
                activeTabId = Number(storedActiveTab);
            } else {
                activeTabId = tabs[0].id;
            }

            switchTab(activeTabId);
        }
    }

    // Load tabs when page starts
    loadTabs();

</script>

</body>
</html>
